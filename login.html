<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exalt Digital — Sign In</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f8f8; color: #111;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: #111; color: #fff;
      padding: 1.25rem 5%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 1.3rem; font-weight: 800; text-decoration: none; color: #fff; }
    .logo span { color: #a78bfa; }

    .page {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 2rem 1rem;
    }
    .card {
      background: #fff; border-radius: 16px;
      border: 2px solid #e5e5e5;
      padding: 2.5rem; width: 100%; max-width: 420px;
    }
    .card h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 0.25rem; }
    .card > p { font-size: 0.95rem; color: #666; margin-bottom: 2rem; }

    /* tabs */
    .tabs {
      display: flex; gap: 0; margin-bottom: 2rem;
      border-bottom: 2px solid #eee;
    }
    .tab {
      flex: 1; padding: 0.6rem; text-align: center;
      font-weight: 700; font-size: 0.95rem; cursor: pointer;
      color: #999; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color .15s, border-color .15s;
    }
    .tab.active { color: #7c6fff; border-color: #7c6fff; }

    label {
      display: block;
      font-size: 0.8rem; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; padding: 0.8rem 1rem;
      border: 2px solid #e5e5e5; border-radius: 10px;
      font-size: 1rem; color: #111; outline: none;
      transition: border-color .2s; margin-bottom: 1.25rem;
      background: #fafafa;
    }
    input:focus { border-color: #7c6fff; background: #fff; }

    .btn {
      width: 100%; padding: 1rem;
      background: #7c6fff; color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 1.1rem; font-weight: 800;
      box-shadow: 0 4px 16px rgba(124,111,255,0.35);
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 1rem; padding: 0.8rem 1rem;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600;
      display: none;
    }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }
    .msg.success { background: #dcfce7; color: #166534; display: block; }

    footer {
      background: #111; color: #666;
      padding: 1.25rem 5%; text-align: center; font-size: 0.85rem;
    }
    footer span { color: #a78bfa; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">Exalt <span>Digital</span></a>
</header>

<div class="page">
  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to view your campaigns, or create a new account.</p>

    <div class="tabs">
      <div class="tab active" data-tab="signin">Sign in</div>
      <div class="tab" data-tab="signup">Create account</div>
    </div>

    <!-- Sign in form -->
    <div id="signin-form">
      <label>Email address</label>
      <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password" />
      <button class="btn" id="signin-btn">Sign in</button>
    </div>

    <!-- Sign up form -->
    <div id="signup-form" style="display:none;">
      <label>Email address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Choose a password (min 8 chars)" autocomplete="new-password" />
      <label>Your website address</label>
      <input type="text" id="signup-site" placeholder="e.g. www.mywebsite.com.au" autocomplete="url" />
      <button class="btn" id="signup-btn">Create account</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>
</div>

<footer>&copy; 2026 <span>Exalt Digital</span>. All rights reserved.</footer>

<script>
  var cfg = window.ExaltConfig
  var sb  = window.supabase.createClient(cfg.supabase.url, cfg.supabase.anonKey)

  // Redirect if already logged in
  sb.auth.getSession().then(function(r) {
    if (r.data.session) window.location.href = '/dashboard.html'
  })

  // Tab switching
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active') })
      this.classList.add('active')
      document.getElementById('signin-form').style.display = this.dataset.tab === 'signin' ? '' : 'none'
      document.getElementById('signup-form').style.display = this.dataset.tab === 'signup' ? '' : 'none'
      clearMsg()
    })
  })

  function showMsg(text, type) {
    var el = document.getElementById('msg')
    el.textContent = text
    el.className = 'msg ' + type
  }
  function clearMsg() {
    var el = document.getElementById('msg')
    el.className = 'msg'
    el.textContent = ''
  }

  // Sign in
  document.getElementById('signin-btn').addEventListener('click', async function() {
    var email    = document.getElementById('signin-email').value.trim()
    var password = document.getElementById('signin-password').value
    if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return }

    this.textContent = 'Signing in…'
    this.disabled = true

    var { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) {
      showMsg(error.message, 'error')
      this.textContent = 'Sign in'
      this.disabled = false
    } else {
      window.location.href = '/dashboard.html'
    }
  })

  // Sign up
  document.getElementById('signup-btn').addEventListener('click', async function() {
    var email    = document.getElementById('signup-email').value.trim()
    var password = document.getElementById('signup-password').value
    var siteUrl  = document.getElementById('signup-site').value.trim()
    if (!email || !password) { showMsg('Please enter your email and a password.', 'error'); return }
    if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return }
    if (!siteUrl) { showMsg('Please enter your website address.', 'error'); return }

    this.textContent = 'Creating account…'
    this.disabled = true

    var { error } = await sb.auth.signUp({ email, password, options: { data: { site_url: siteUrl } } })
    if (error) {
      showMsg(error.message, 'error')
      this.textContent = 'Create account'
      this.disabled = false
      return
    }
    // Auto sign-in immediately (requires "Confirm email" OFF in Supabase Dashboard → Auth → Providers → Email)
    var { error: loginErr } = await sb.auth.signInWithPassword({ email, password })
    if (loginErr) {
      showMsg('Account created! You can now sign in.', 'success')
      this.textContent = 'Create account'
      this.disabled = false
    } else {
      window.location.href = '/dashboard.html'
    }
  })

  // Enter key submits
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return
    var activeTab = document.querySelector('.tab.active').dataset.tab
    document.getElementById(activeTab + '-btn').click()
  })
</script>
</body>
</html>
